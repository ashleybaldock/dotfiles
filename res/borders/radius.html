<!doctype html>
<html lang="en">
  <head>
    <title>Border Radius</title>
    <!--{{{-->
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="borders.css"/>
    <link rel="stylesheet" href="radius.css" />

    <!--<script type="application/javascript" src="/entanglement.js"></script>--->

    <script type="module" src="radius.js"></script>
    <!--}}}-->
  </head>
  <body>
    <section class="screen stest" data-sink="ax ay bx by cx cy dx dy">
      <h2>Border Radius</h2>
      <div class="preview">
        <div class="line">
          <div class="oval axy">
            <div class="radii"></div>
            <div class="point ax">ax</div>
            <div class="point ay">ay</div>
          </div>
          <div class="oval bxy">
            <div class="radii"></div>
            <div class="point bx">bx</div>
            <div class="point by">by</div>
          </div>
          <div class="oval cxy">
            <div class="radii"></div>
            <div class="point cx">cx</div>
            <div class="point cy">cy</div>
          </div>
          <div class="oval dxy">
            <div class="radii"></div>
            <div class="point dx">dx</div>
            <div class="point dy">dy</div>
          </div>
        </div>
      </div>
      <fieldset>
        <label for="ay" class="slider" data-sink="ay">
          <span>ay</span>
          <input data-source class="vertical reversed" id="ay" type="range" value="0" min="0" max="100">
        </label>
        <label for="ax" class="slider" data-sink="ax">
          <span>ax</span>
          <input data-source id="ax" type="range" value="0" min="0" max="100">
        </label>
        <label for="bx" class="slider" data-sink="bx">
          <span>bx</span>
          <input data-source class="reversed" id="bx" type="range" value="0" min="0" max="100">
        </label>
        <label for="by" class="slider" data-sink="by">
          <span>by</span>
          <input data-source class="vertical reversed" id="by" type="range" value="0" min="0" max="100">
        </label>
        <label for="cy" class="slider" data-sink="cy">
          <span>cy</span>
          <input data-source class="vertical" id="cy" type="range" value="0" min="0" max="100">
        </label>
        <label for="cx" class="slider" data-sink="cx">
          <span>cx</span>
          <input data-source class="reversed" id="cx" type="range" value="0" min="0" max="100">
        </label>
        <label for="dx" class="slider" data-sink="dx">
          <span>dx</span>
          <input data-source id="dx" type="range" value="0" min="0" max="100">
        </label>
        <label for="dy" class="slider" data-sink="dy">
          <span>dy</span>
          <input data-source class="vertical" id="dy" type="range" value="0" min="0" max="100">
        </label>
      </fieldset>
    </section>
  </body>
</html>
