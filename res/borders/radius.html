<!doctype html>
<html lang="en">
  <head>
    <title>Border Radius</title>
    <!--{{{-->
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="borders.css"/>
    <link rel="stylesheet" href="radius.css" />

    <!--<script type="application/javascript" src="/entanglement.js"></script>--->

    <script type="module" src="radius.js"></script>
    <!--}}}-->
  </head>
  <body>
      <section class="screen">
      <h2>Border Radius</h2>
        <div class="testbase stest">
          <div class="preview" data-sink="bd_ax bd_ay bd_bx bd_by bd_cx bd_cy bd_dx bd_dy">
            <div class="line">
            <div class="oval bd_axy">
              <div class="radii"></div>
              <div class="point bd_ax">ax</div>
              <div class="point bd_ay">ay</div>
            </div>
            <div class="oval bd_bxy">
              <div class="radii"></div>
              <div class="point bd_bx">bx</div>
              <div class="point bd_by">by</div>
            </div>
            <div class="oval bd_cxy">
              <div class="radii"></div>
              <div class="point bd_cx">cx</div>
              <div class="point bd_cy">cy</div>
            </div>
            <div class="oval bd_dxy">
              <div class="radii"></div>
              <div class="point bd_dx">dx</div>
              <div class="point bd_dy">dy</div>
            </div>
          </div>
        </div>
        <label for="bd_ay" class="slider-wrapper" data-sink="bd_ay">
          <span>ay:left@top</span>
          <input data-source class="vertical reversed" id="bd_ay" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_ax" class="slider-wrapper" data-sink="bd_ax">
          <span>ax:top@left</span>
          <input data-source id="bd_ax" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_bx" class="slider-wrapper" data-sink="bd_bx">
          <span>bx:top@right)</span>
          <input data-source class="reversed" id="bd_bx" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_by" class="slider-wrapper" data-sink="bd_by">
          <span>by:right@top)</span>
          <input data-source class="vertical reversed" id="bd_by" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_cy" class="slider-wrapper" data-sink="bd_cy">
          <span>cy:right@bot</span>
          <input data-source class="vertical" id="bd_cy" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_cx" class="slider-wrapper" data-sink="bd_cx">
          <span>cx:bot@right</span>
          <input data-source class="reversed" id="bd_cx" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_dx" class="slider-wrapper" data-sink="bd_dx">
          <span>dx:bot@left</span>
          <input data-source id="bd_dx" type="range" value="0" min="0" max="200">
        </label>
        <label for="bd_dy" class="slider-wrapper" data-sink="bd_dy">
          <span>dy:left@bot</span>
          <input data-source class="vertical" id="bd_dy" type="range" value="0" min="0" max="200">
        </label>
      </section>
  </body>
</html>
