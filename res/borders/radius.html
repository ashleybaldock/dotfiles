<!doctype html>
<html lang="en">
  <head>
    <title>Border Radius</title>
    <!--{{{-->
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="borders.css"/>
    <link rel="stylesheet" href="radius.css" />

    <!--<script type="application/javascript" src="/entanglement.js"></script>--->

    <script type="module" src="radius.js"></script>
    <!--}}}-->
  </head>
  <body>
    <fieldset class="screen stest" data-sink="ax ay bx by cx cy dx dy">
      <h2>Border Radius</h2>
      <div class="preview">
        <div class="outline">
        </div>
      </div>
          <div class="oval axy"></div>
          <div class="oval bxy"></div>
          <div class="oval cxy"></div>
          <div class="oval dxy"></div>

          <div class="point ay">ay</div>
          <div class="point ax">ax</div>
          <div class="point bx">bx</div>
          <div class="point by">by</div>
          <div class="point cy">cy</div>
          <div class="point cx">cx</div>
          <div class="point dx">dx</div>
          <div class="point dy">dy</div>
      <input data-source id="ay" type="range" value="0" min="0" max="100" class="vertical reversed">
      <input data-source id="ax" type="range" value="0" min="0" max="100">
      <input data-source id="bx" type="range" value="0" min="0" max="100" class="reversed" >
      <input data-source id="by" type="range" value="0" min="0" max="100" class="vertical reversed" >
      <input data-source id="cy" type="range" value="0" min="0" max="100" class="vertical" >
      <input data-source id="cx" type="range" value="0" min="0" max="100" class="reversed" >
      <input data-source id="dx" type="range" value="0" min="0" max="100">
      <input data-source id="dy" type="range" value="0" min="0" max="100" class="vertical" >
      <label for="ay" class="slider"></label>
      <label for="ax" class="slider"></label>
      <label for="bx" class="slider"></label>
      <label for="by" class="slider"></label>
      <label for="cy" class="slider"></label>
      <label for="cx" class="slider"></label>
      <label for="dx" class="slider"></label>
      <label for="dy" class="slider"></label>
      </fieldset>
  </body>
</html>
