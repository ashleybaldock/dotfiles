<!doctype html>
<html lang="en">
  <head>
    <title>Cursors</title>
    <!--{{{-->
    <meta charset="utf-8" http-equiv="Content-type" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="cursors.css" />
    <link rel="stylesheet" href="cursors-demo.css" />
    <!--}}}-->
  </head>
  <body>
    <h1>Cursors</h1>

    <form id="display">
      <fieldset>
        <legend>Options</legend>
        <div class="toggle">
          <label class="animate-ab">
            <input
              type="checkbox"
              data-source
              checked
              name="animate-ab"
              id="animate-ab"
              value="animate-ab"
            />
            <div>A/B Animation</div>
          </label>
        </div>
        <div class="toggle">
          <label class="hotspots">
            <input
              type="checkbox"
              data-source
              checked
              name="hotspots"
              id="hotspots"
              value="hotspots"
            />
            <div>Hotspots</div>
          </label>
        </div>
      </fieldset>
    </form>

    <section class="pointer">
      <h2>pointer</h2>
      <h3>OSX default</h3>
      <div data-cursor="osx-default-small" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-default-medium" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-default-big" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-default-giant" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <h3>Rounded</h3>
      <div data-cursor="pointer-small" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="pointer-medium" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="pointer-big" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="pointer-giant" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
    </section>
    <section class="noita">
      <h2>noita</h2>
      <div
        data-cursor="noita-mouse-system-big"
        data-cursor-fallback="crosshair"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="noita-mouse" data-cursor-fallback="crosshair">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="noita-mouse-big" data-cursor-fallback="crosshair">
        <div><div class="hotspot"></div></div>
      </div>
    </section>
    <section class="media">
      <h2>media</h2>
      <div
        data-cursor="media-play"
        data-cursor-fallback="crosshair"
        data-file="scaled"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="media-pause"
        data-cursor-fallback="crosshair"
        data-file="scaled"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="media-default-play" data-cursor-fallback="not-allowed">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="media-default-pause" data-cursor-fallback="not-allowed">
        <div><div class="hotspot"></div></div>
      </div>

      <div data-cursor="media-default" data-cursor-fallback="default">
        <div><div class="hotspot"></div></div>
      </div>
    </section>

    <section class="osx">
      <h2>OSX</h2>
      <h3>Which map to cursor keyword</h3>
      <div
        data-cursor="osx-default"
        data-cursor-fallback="default"
        data-file="default.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>

      <div
        data-cursor="osx-handpointing"
        data-cursor-fallback="pointer"
        data-file="handpointing.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>

      <div
        data-cursor="osx-handopen"
        data-cursor-fallback="grab"
        data-file="handopen.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-handgrabbing"
        data-cursor-fallback="grabbing"
        data-file="handgrabbing.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-busy"
        data-cursor-fallback="wait"
        data-file="busy.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-notallowed"
        data-cursor-fallback="not-allowed"
        data-file="notallowed.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-copy"
        data-cursor-fallback="copy"
        data-file="copy.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-contextualmenu"
        data-cursor-fallback="context-menu"
        data-file="contextualmenu.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-cell"
        data-cursor-fallback="cell"
        data-file="cell.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-cross"
        data-cursor-fallback="crosshair"
        data-file="cross.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-help"
        data-cursor-fallback="help"
        data-file="help.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-makealias"
        data-cursor-fallback="alias"
        data-file="makealias.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor-fallback="move"
        data-cursor="osx-move"
        data-file="move.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizedown"
        data-cursor-fallback="s-resize"
        data-file="resizedown.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizeleft"
        data-cursor-fallback="w-resize"
        data-file="resizeleft.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizeleftright"
        data-cursor-fallback="col-resize"
        data-file="resizeleftright.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizenortheast"
        data-cursor-fallback="ne-resize"
        data-file="resizenortheast.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizenortheastsouthwest"
        data-cursor-fallback="nesw-resize"
        data-file="resizenortheastsouthwest.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizenorthwest"
        data-cursor-fallback="nw-resize"
        data-file="resizenorthwest.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizenorthwestsoutheast"
        data-cursor-fallback="nwse-resize"
        data-file="resizenorthwestsoutheast.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizeright"
        data-cursor-fallback="e-resize"
        data-file="resizeright.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizesoutheast"
        data-cursor-fallback="se-resize"
        data-file="resizesoutheast.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizesouthwest"
        data-cursor-fallback="sw-resize"
        data-file="resizesouthwest.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizeup"
        data-cursor-fallback="n-resize"
        data-file="resizeup.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-resizeupdown"
        data-cursor-fallback="row-resize"
        data-file="resizeupdown.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-textcursor"
        data-cursor-fallback="text"
        data-file="textcursor.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-textcursorvertical"
        data-cursor-fallback="vertical-text"
        data-file="textcursorvertical.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-zoomin"
        data-cursor-fallback="zoom-in"
        data-file="zoomin.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-zoomout"
        data-cursor-fallback="zoom-out"
        data-file="zoomout.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>

      <h3>Others</h3>
      <div data-cursor="osx-beachball" data-file="beachball.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div
        data-cursor="osx-screenshotselection"
        data-file="screenshotselection.svg"
      >
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-screenshotwindow" data-file="screenshotwindow.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-poof" data-file="poof.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizeeast" data-file="resizeeast.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizenorth" data-file="resizenorth.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizenorthsouth" data-file="resizenorthsouth.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizesouth" data-file="resizesouth.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizewest" data-file="resizewest.svg">
        <div><div class="hotspot"></div></div>
      </div>
      <div data-cursor="osx-resizewesteast" data-file="resizewesteast.svg">
        <div><div class="hotspot"></div></div>
      </div>
    </section>
  </body>
</html>
