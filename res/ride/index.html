<!doctype html>
<html lang="en">
  <head>
    <title>Check</title>

    <meta charset="utf-8" />

    <link rel="stylesheet" href="/common.css" />

  </head>
  <body>
    <form>
      <h2>Form</h2>
      <fieldset class="gates">
        <legend>Confirm</legend>
        <label for="gate1"
          ><input type="checkbox" id="gate1" checked /><span
            >Question 1</span
          ></label
        >
        <label for="gate2"
          ><input type="checkbox" id="gate2" /><span>Question 2</span></label
        >
        <label for="gate3"
          ><input type="checkbox" id="gate3" /><span>Question 3</span></label
        >
      </fieldset>
      <fieldset class="ride">
        <legend>Details:</legend>

        <label for="who"
          ><span>Description</span><textarea id="who" type="text"> </textarea>
        </label>
      </fieldset>
      <fieldset class="ride">
        <legend>Info:</legend>
        <label for="where"
          ><span>Description 2</span
          ><textarea id="where" type="text"></textarea>
        </label>
      </fieldset>
      <label for="submit"
        ><input type="submit" id="submit" value="Send Request"
      /></label>
    </form>

    <section class=""></section>
  </body>
</html>
